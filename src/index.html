<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fbf1e1" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Mochi — Family Assistant</title>

    <!-- PWA. Bun's HTML bundler tries to resolve `<link rel="manifest">`
         and `<link rel="apple-touch-icon">` hrefs as build-time assets, so
         those two links are injected from frontend.tsx at runtime instead. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mochi" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1&family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script type="module" src="./frontend.tsx" async></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
